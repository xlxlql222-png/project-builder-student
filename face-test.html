<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강아지상 vs 고양이상 테스트 🐶🐱</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="face-test-body">
    <nav class="top-nav">
        <a href="index.html" class="nav-link">🏠 로또 번호 뽑기</a>
        <a href="face-test.html" class="nav-link active">🐶 멍냥상 테스트</a>
    </nav>

    <main class="container">
        <h1 class="title">강아지상 vs 고양이상? 🐾</h1>
        <p class="subtitle">내 얼굴은 어떤 동물과 닮았을까? 지금 바로 확인해보세요!</p>

        <div class="upload-section">
            <div id="image-upload-area" class="upload-area">
                <img id="face-image" src="#" alt="내 사진" style="display:none;">
                <div id="upload-label">
                    <span class="upload-icon">📸</span>
                    <p>사진을 클릭하여 업로드하세요</p>
                </div>
                <input type="file" id="image-input" accept="image/*" style="display:none;">
            </div>
            
            <button id="predict-btn" class="generate-btn" style="display:none;">결과 확인하기 ✨</button>
            <div id="loading" class="loading" style="display:none;">
                <div class="spinner"></div>
                <p>모델을 불러오는 중...</p>
            </div>
        </div>

        <div id="result-area" class="result-area" style="display:none;">
            <h2 id="result-message">분석 결과</h2>
            <div id="label-container" class="label-container">
                <!-- 결과 게이지 바가 여기에 들어갑니다 -->
            </div>
            <button onclick="location.reload()" class="retry-btn">다시 하기 🔄</button>
        </div>

        <!-- Disqus Section -->
        <div class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-uvrdbzn2ha.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
        </div>
    </main>

    <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">
        <svg id="theme-icon" viewBox="0 0 24 24"></svg>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="face-test.js"></script>
    <script src="main.js"></script> <!-- 테마 로직 재사용 -->
</body>
</html>
