<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>심쿵! 로맨스 주인공 테스트 💖</title>
    <meta name="description" content="내가 드라마 속 주인공이라면? 소녀/소년 버전으로 즐기는 나만의 로맨틱 심리 테스트!">
    <meta name="google-adsense-account" content="ca-pub-3356525968669327">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3356525968669327"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="cute-theme">
    <div class="background-blobs">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>

    <!-- 모드 전환 플로팅 버튼 -->
    <button id="view-mode-toggle" class="view-mode-toggle" aria-label="화면 모드 변경">
        <span class="pc-icon">💻 PC 모드</span>
        <span class="mobile-icon">📱 모바일 모드</span>
    </button>

    <main id="app-container" class="container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen-container">
            <header class="header">
                <div class="badge-wrapper">
                    <span class="cute-badge">✨ 로맨틱 심리 테스트</span>
                </div>
                <h1 class="main-title">드라마 속 나의<br>주인공 타입은? 🎬</h1>
                <p class="main-subtitle">당신만의 로맨틱한 매력을 분석해드려요!</p>
            </header>

            <section class="guide-box">
                <div class="guide-item"><span>🌸</span> 연애 성향 상황별 정밀 분석</div>
                <div class="guide-item"><span>💑</span> 소년/소녀 맞춤형 결과 제공</div>
            </section>
            
            <div class="gender-choice">
                <p class="choice-label">어떤 이야기를 시작할까요?</p>
                <div class="choice-column">
                    <button class="choice-btn female" onclick="startQuiz('female')">
                        <span class="emoji">🎀</span>
                        <div class="btn-text">
                            <strong>소녀 버전 (여주인공)</strong>
                        </div>
                    </button>
                    <button class="choice-btn male" onclick="startQuiz('male')">
                        <span class="emoji">🧢</span>
                        <div class="btn-text">
                            <strong>소년 버전 (남주인공)</strong>
                        </div>
                    </button>
                </div>
            </div>

            <section class="daily-bonus">
                <div class="lucky-card-header">
                    <h3>🍀 오늘의 로맨스 행운 아이템</h3>
                </div>
                <div id="daily-lucky-item" class="lucky-bubble">
                    <p>행운을 확인해보세요!</p>
                </div>
            </section>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="screen-container hidden">
            <div class="quiz-progress-wrapper">
                <div class="progress-info">
                    <span id="progress-text">1 / 6</span>
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            </div>
            <h2 id="question-text" class="question-title">질문 로딩 중...</h2>
            <div id="answers-container" class="bubble-answers-column"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen-container hidden">
            <div class="result-card">
                <span class="result-tag">당신은...</span>
                <h1 id="result-title" class="res-title">결과 제목</h1>
                <h3 id="result-subtitle" class="res-sub">부제</h3>
                <div class="result-divider"></div>
                <p id="result-desc" class="res-desc">상세 설명</p>
                <div class="result-tip">
                    <strong>💝 연애 팁</strong>
                    <p id="result-tip-text">팁 내용</p>
                </div>
                <div class="action-buttons">
                    <button onclick="location.reload()" class="retry-bubble">다시 하기 🔄</button>
                </div>
            </div>
        </div>

        <!-- Community Section -->
        <section class="comments-area">
            <h3>방명록 & 소통 💬</h3>
            <div id="disqus_thread"></div>
        </section>
    </main>

    <footer class="cute-footer">
        <div class="footer-links">
            <a href="#" id="open-privacy">Privacy</a>
            <span class="sep">|</span>
            <a href="#" id="open-contact">Contact</a>
        </div>
        <p>© 2026 Romance Destiny. Made with 💖</p>
    </footer>

    <div class="controls-overlay">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="테마 변경">
            <svg id="theme-icon" viewBox="0 0 24 24"></svg>
        </button>
    </div>

    <!-- Contact Modal -->
    <div id="contact-modal" class="modal">
        <div class="modal-content cute-card">
            <span class="close-modal">&times;</span>
            <h2>🤝 제휴 및 문의</h2>
            <form action="https://formspree.io/f/xdalpkbz" method="POST" class="cute-form">
                <input type="email" name="email" required placeholder="답변받으실 이메일">
                <textarea name="message" required placeholder="문의하실 내용을 자유롭게 적어주세요!"></textarea>
                <button type="submit" class="submit-bubble">보내기 ✨</button>
            </form>
        </div>
    </div>

    <script src="theme.js"></script>
    <script src="quiz.js"></script>
    <script>
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-uvrdbzn2ha.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
