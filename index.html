<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로맨스 여주인공 테스트 💖</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="face-test-body">
    <nav class="top-nav">
        <a href="index.html" class="nav-link active">💖 로맨스 테스트</a>
        <a href="lotto.html" class="nav-link">🍀 로또 번호 뽑기</a>
    </nav>

    <div class="noise-overlay"></div>
    <main class="container">
        
        <!-- Start Screen -->
        <div id="start-screen" class="screen-container">
            <header class="header">
                <h1 class="title">나의 로맨스 여주 재질은? ✨</h1>
                <p class="subtitle">나는 어떤 드라마의 주인공일까? <br>지금 바로 확인해보세요!</p>
            </header>
            <div class="hero-image">💑</div>
            <button id="start-btn" class="generate-btn">테스트 시작하기! 💕</button>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="screen-container hidden">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" style="width: 25%"></div>
            </div>
            <h2 class="question-container">질문이 여기에 나옵니다.</h2>
            <div class="answers-container">
                <!-- 버튼들이 생성됩니다 -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen-container hidden">
            <h3 id="result-subtitle" class="result-subtitle">부제</h3>
            <h1 id="result-title" class="title">결과 제목</h1>
            <p id="result-desc" class="result-desc">결과 설명이 나옵니다.</p>
            <button id="retry-btn" class="retry-btn">다시 하기 🔄</button>
        </div>

        <!-- Disqus Section -->
        <div class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-uvrdbzn2ha.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
        </div>
    </main>

    <div class="controls">
        <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">
            <svg id="theme-icon" viewBox="0 0 24 24"></svg>
        </button>
        <button id="contact-toggle" class="contact-toggle" aria-label="제휴 문의 열기">
            <span>제휴 문의하기 🤝</span>
        </button>
    </div>

    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>🤝 소중한 제안을 기다립니다</h2>
            <form action="https://formspree.io/f/xdalpkbz" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">성함</label>
                    <input type="text" id="name" name="name" required placeholder="성함을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" required placeholder="답변받으실 이메일">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="문의하실 내용을 자유롭게 적어주세요!"></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기 🚀</button>
            </form>
        </div>
    </div>

    <script src="theme.js"></script>
    <script src="quiz.js"></script> <!-- 심리 테스트 JS로 교체 -->
</body>
</html>
